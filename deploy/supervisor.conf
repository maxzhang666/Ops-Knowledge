; =============================================================================
; Ops-Knowledge Supervisor Configuration
;
; Install:
;   sudo cp deploy/supervisor.conf /etc/supervisor/conf.d/ops-knowledge.conf
;   sudo supervisorctl reread
;   sudo supervisorctl update
;
; Manage:
;   sudo supervisorctl status ops-knowledge:*
;   sudo supervisorctl start ops-knowledge:*
;   sudo supervisorctl stop ops-knowledge:*
;   sudo supervisorctl restart ops-knowledge:*
;
; IMPORTANT: Update paths below to match your deployment directory.
; =============================================================================

[group:ops-knowledge]
programs=api,worker,beat

[program:api]
command=%(ENV_PROJECT_DIR)s/scripts/start.sh api
directory=%(ENV_PROJECT_DIR)s
user=%(ENV_RUN_USER)s
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=30
stopasgroup=true
killasgroup=true
stdout_logfile=%(ENV_PROJECT_DIR)s/logs/api.log
stderr_logfile=%(ENV_PROJECT_DIR)s/logs/api-error.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
environment=HOME="/home/%(ENV_RUN_USER)s",PATH="%(ENV_PROJECT_DIR)s/.venv/bin:%(ENV_PATH)s"

[program:worker]
command=%(ENV_PROJECT_DIR)s/scripts/start.sh worker
directory=%(ENV_PROJECT_DIR)s
user=%(ENV_RUN_USER)s
autostart=true
autorestart=true
startsecs=10
startretries=3
stopwaitsecs=60
stopasgroup=true
killasgroup=true
stdout_logfile=%(ENV_PROJECT_DIR)s/logs/worker.log
stderr_logfile=%(ENV_PROJECT_DIR)s/logs/worker-error.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
environment=HOME="/home/%(ENV_RUN_USER)s",PATH="%(ENV_PROJECT_DIR)s/.venv/bin:%(ENV_PATH)s"

[program:beat]
command=%(ENV_PROJECT_DIR)s/scripts/start.sh beat
directory=%(ENV_PROJECT_DIR)s
user=%(ENV_RUN_USER)s
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=10
stopasgroup=true
killasgroup=true
stdout_logfile=%(ENV_PROJECT_DIR)s/logs/beat.log
stderr_logfile=%(ENV_PROJECT_DIR)s/logs/beat-error.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
environment=HOME="/home/%(ENV_RUN_USER)s",PATH="%(ENV_PROJECT_DIR)s/.venv/bin:%(ENV_PATH)s"
